<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SJCC PC Hardware Repair Lab</title>
<style>
:root{
  --sjcc-purple:#2e1a47;
  --sjcc-purple-dark:#12091f;
  --sjcc-purple-mid:#4c3a86;
  --sjcc-gold:#ffc72c;
  --sjcc-white:#ffffff;
  --grid:#8da7e0;
  --case:#1b1d1d;
  --case-border:#0a0a0a;
}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;font-family:Arial,Helvetica,sans-serif;background:var(--sjcc-purple-dark);color:var(--sjcc-white)}
body{overflow:hidden}
.lab{
  height:100vh;
  display:grid;
  grid-template-rows:1fr 170px;
  background:
    linear-gradient(135deg,rgba(255,255,255,.03) 25%,transparent 25%) 0 0/8px 8px,
    radial-gradient(circle at 50% 18%,rgba(111,91,190,.28),transparent 45%),
    linear-gradient(135deg,#182b62,#2d3f82 55%,#182b62);
}
.workspace{
  position:relative;
  overflow:hidden;
  background:
repeating-linear-gradient(0deg,rgba(255,255,255,.10) 0 2px,transparent 2px 40px),
repeating-linear-gradient(90deg,rgba(255,255,255,.10) 0 2px,transparent 2px 40px),
linear-gradient(135deg,#2e1a47,#412d69 55%,#5a4691);
}
.workspace:before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.04) 25%,transparent 25%) 0 0/10px 10px;
  opacity:.55;
  pointer-events:none;
}
.pc-case{
  position:absolute;
  left:58%;
  top:48%;
  transform:translate(-50%,-50%);
  width:min(43vw,570px);
  height:min(70vh,560px);
  min-width:460px;
  min-height:440px;
  background:linear-gradient(145deg,#212322,#151716);
  border:18px solid #282a2b;
  border-radius:6px;
  box-shadow:0 18px 35px rgba(0,0,0,.45), inset 0 0 0 3px #050607;
}
.pc-case:after{
  content:"";
  position:absolute;
  top:-18px;
  right:-58px;
  width:58px;
  height:calc(100% + 36px);
  background:#5a5859;
  border:3px solid #0a0a0a;
  border-left:0;
  border-radius:0 6px 6px 0;
}
.top-clip{
  position:absolute;
  top:-15px;
  width:42px;
  height:9px;
  border:3px solid #050505;
  border-top:0;
  background:#111;
  border-radius:0 0 4px 4px;
}
.top-clip.one{left:34px}
.top-clip.two{left:50%;transform:translateX(-50%)}
.top-clip.three{right:34px}
.inner{
  position:absolute;
  inset:20px;
  border:3px solid #090909;
  background:#161918;
  box-shadow:inset 0 0 45px rgba(0,0,0,.75);
}
.panel-slot{
  position:absolute;
  left:24px;
  top:22px;
  width:47%;
  height:33%;
  background:linear-gradient(145deg,#242827,#151817);
  border:2px solid #070707;
  border-radius:5px;
  box-shadow:inset 0 0 22px rgba(0,0,0,.75);
}
.warning{
  position:absolute;
  left:34px;
  top:20px;
  width:62px;
  height:58px;
  filter:drop-shadow(0 4px 3px rgba(0,0,0,.55));
}
.airflow{
  position:absolute;
  right:24px;
  top:24px;
  width:31%;
  height:52%;
  display:grid;
  grid-template-rows:1fr 1fr;
  gap:12px;
}
.mesh{
  border:3px solid #151515;
  background:
    radial-gradient(circle,#2d2a6d 0 3px,transparent 4px) 0 0/13px 13px,
    #060707;
  box-shadow:inset 0 0 22px rgba(0,0,0,.85);
}
.separator{
  position:absolute;
  left:0;
  right:0;
  top:67%;
  height:3px;
  background:#2e302f;
  border-top:1px solid #0b0b0b;
}
.bottom-vent{
  position:absolute;
  left:24px;
  bottom:26px;
  width:67%;
  height:23%;
  background:#292b2b;
}
.bottom-vent:before{
  content:"";
  position:absolute;
  inset:16px 78px 15px 16px;
  background:repeating-linear-gradient(135deg,transparent 0 12px,#080909 13px 20px,transparent 21px 32px);
  border-radius:4px;
}
.shelf{
  background:
    linear-gradient(135deg,rgba(255,255,255,.035) 25%,transparent 25%) 0 0/8px 8px,
    linear-gradient(180deg,#202f63 0,#202f63 42%,#090812 43%,#07060d 100%);
  display:grid;
  grid-template-rows:12px 1fr;
  border-top:1px solid rgba(255,255,255,.15);
}
.shelf-title{
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:0;
  font-weight:900;
  letter-spacing:.01em;
  color:#f4f3ff;
}
.parts{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:clamp(24px,4vw,64px);
  padding:8px 26px 22px;
}
.part{
  width:82px;
  height:72px;
  display:flex;
  align-items:center;
  justify-content:center;
  border:0;
  background:transparent;
  cursor:grab;
  transition:transform .15s ease, filter .15s ease;
}
.part:hover{transform:translateY(-4px) scale(1.06);filter:drop-shadow(0 0 12px rgba(255,199,44,.5))}
.part svg{width:78px;height:68px}

.glass-panel{
  position:absolute;
  left:6%;
  top:12%;
  width:min(34vw,480px);
  height:min(46vh,370px);
  min-width:330px;
  min-height:270px;
  border:18px solid #2a2d2d;
  border-radius:4px;
  background:linear-gradient(135deg,rgba(205,220,255,.16),rgba(255,255,255,.04));
  box-shadow:0 16px 28px rgba(0,0,0,.42), inset 0 0 30px rgba(255,255,255,.08);
  cursor:grab;
}
.glass-panel:before{
  content:"";
  position:absolute;
  inset:10px;
  background:
    repeating-linear-gradient(0deg,rgba(255,255,255,.16) 0 2px,transparent 2px 40px),
    repeating-linear-gradient(90deg,rgba(255,255,255,.16) 0 2px,transparent 2px 40px);
  opacity:.7;
}
.glass-panel:after{
  content:"";
  position:absolute;
  left:-23px;
  top:38%;
  width:9px;
  height:42px;
  background:#1a1c1c;
  border-radius:6px;
  box-shadow:0 190px 0 #1a1c1c;
}
.glass-warning{
  position:absolute;
  left:30px;
  top:28px;
  width:62px;
  height:58px;
  z-index:2;
  filter:drop-shadow(0 4px 3px rgba(0,0,0,.55));
}


.glass-drop-zone{
  position:absolute;
  left:58%;
  top:48%;
  transform:translate(-50%,-50%);
  width:min(43vw,570px);
  height:min(70vh,560px);
  min-width:460px;
  min-height:440px;
  border:none !important;
  border-radius:8px;
  pointer-events:auto;
  z-index:4;
}
.removed-tray{
  position:absolute;
  left:5%;
  top:10%;
  width:min(36vw,510px);
  height:min(50vh,400px);
  min-width:350px;
  min-height:290px;
  border:none !important;
  border-radius:8px;
  pointer-events:auto;
  z-index:3;
}
.drag-active .glass-drop-zone,
.drag-active .removed-tray{
  border-color:rgba(255,199,44,.75);
  background:rgba(255,199,44,.09);
}
.drag-over{
  border-color:#ffc72c !important;
  background:rgba(255,199,44,.18) !important;
  box-shadow:0 0 22px rgba(255,199,44,.35);
}
.glass-panel{
  z-index:10;
}
.glass-panel.dragging{
  opacity:.6;
  filter:drop-shadow(0 0 18px rgba(255,199,44,.55));
}
.glass-panel.on-case{
  left:58%;
  top:48%;
  transform:translate(-50%,-50%);
  width:min(43vw,570px);
  height:min(70vh,560px);
  min-width:460px;
  min-height:440px;
  background:linear-gradient(135deg,rgba(205,220,255,.18),rgba(255,255,255,.04));
  z-index:20;
}
.glass-panel.removed{
  left:6%;
  top:12%;
  transform:none;
}
.part[data-draggable="true"]{
  cursor:grab;
}
.part.dragging{
  opacity:.55;
}


.free-dragging{
  position:fixed !important;
  transform:none !important;
  z-index:9999 !important;
  pointer-events:none !important;
  opacity:.88 !important;
  filter:drop-shadow(0 0 22px rgba(255,199,44,.7)) !important;
}
.glass-panel.correct-placed{
  outline:4px solid rgba(255,199,44,.9);
  box-shadow:0 0 26px rgba(255,199,44,.45),0 16px 28px rgba(0,0,0,.42), inset 0 0 30px rgba(255,255,255,.08);
}


/* Smooth SJCC drag engine */
[data-draggable="true"]{
  touch-action:none;
  user-select:none;
  cursor:grab;
}
.drag-clone{
  position:fixed !important;
  z-index:99999 !important;
  pointer-events:none !important;
  margin:0 !important;
  transform:rotate(-2deg) scale(1.03) !important;
  opacity:.92 !important;
  filter:drop-shadow(0 0 22px rgba(255,199,44,.7)) !important;
}
.drag-source-hidden{
  opacity:.28 !important;
}
.drop-zone-active{
  border-color:rgba(255,199,44,.78) !important;
  background:rgba(255,199,44,.10) !important;
}
.drop-zone-hover{
  border-color:#ffc72c !important;
  background:rgba(255,199,44,.22) !important;
  box-shadow:0 0 24px rgba(255,199,44,.45) !important;
}
.snap-correct{
  animation:snapCorrect .28s ease-out;
  outline:4px solid rgba(255,199,44,.95);
}
@keyframes snapCorrect{
  0%{transform:scale(.94)}
  70%{transform:scale(1.04)}
  100%{transform:scale(1)}
}
.part.returning,
.glass-panel.returning{
  transition:left .28s ease, top .28s ease, transform .28s ease, opacity .2s ease;
}

@media(max-width:900px){
  body{overflow:auto}
  .lab{height:auto;min-height:100vh;grid-template-rows:620px auto}
  .pc-case{min-width:360px;min-height:360px;width:72vw;height:480px}
  .parts{flex-wrap:wrap;gap:22px}
  .shelf{min-height:250px}
}
</style>

/* Stable free-drag panel engine.
   The panel stays inside .workspace at all times, so the case and panel share the same coordinate system. */
const glassPanel = document.getElementById("glassPanel");
const glassDropZone = document.getElementById("glassDropZone");
const workspace = document.querySelector(".workspace");

let movingPanel = false;
let panelOffsetX = 0;
let panelOffsetY = 0;
let panelRectAtStart = null;

function panelPointerDown(event){
  if(event.button !== undefined && event.button !== 0) return;

  const workspaceRect = workspace.getBoundingClientRect();
  panelRectAtStart = glassPanel.getBoundingClientRect();

  panelOffsetX = event.clientX - panelRectAtStart.left;
  panelOffsetY = event.clientY - panelRectAtStart.top;

  // Convert current visual position to workspace-local absolute coordinates before dragging.
  glassPanel.classList.remove("on-case","removed","free-placed","correct-flash");
  glassPanel.classList.add("is-moving");

  glassPanel.style.left = (panelRectAtStart.left - workspaceRect.left) + "px";
  glassPanel.style.top = (panelRectAtStart.top - workspaceRect.top) + "px";
  glassPanel.style.width="570px";
  glassPanel.style.height="560px";

  document.body.classList.add("drag-active");
  movingPanel = true;

  window.addEventListener("pointermove", panelPointerMove);
  window.addEventListener("pointerup", panelPointerUp, {once:true});
  event.preventDefault();
}

function panelPointerMove(event){
  if(!movingPanel) return;
  movePanel(event.clientX, event.clientY);

  const overCase = pointerInside(event.clientX, event.clientY, glassDropZone);
  glassDropZone.classList.toggle("drop-zone-hover", overCase);
}

function movePanel(clientX, clientY){
  const workspaceRect = workspace.getBoundingClientRect();
  glassPanel.style.left = (clientX - workspaceRect.left - panelOffsetX) + "px";
  glassPanel.style.top = (clientY - workspaceRect.top - panelOffsetY) + "px";
}

function panelPointerUp(event){
  movingPanel = false;
  window.removeEventListener("pointermove", panelPointerMove);
  document.body.classList.remove("drag-active");
  glassDropZone.classList.remove("drop-zone-hover");

  const overCase = pointerInside(event.clientX, event.clientY, glassDropZone);
  glassPanel.classList.remove("is-moving");

  if(overCase){
    closePanel();
  }else{
    leavePanelWhereDropped(event.clientX, event.clientY);
  }
}

function pointerInside(clientX, clientY, element){
  const rect = element.getBoundingClientRect();
  return clientX >= rect.left && clientX <= rect.right && clientY >= rect.top && clientY <= rect.bottom;
}

function closePanel(){
  // Remove inline drag coordinates so CSS controls exact closed-case alignment.
  glassPanel.style.left = "";
  glassPanel.style.top = "";
  glassPanel.style.width = "";
  glassPanel.style.height = "";
  glassPanel.classList.remove("free-placed","removed","is-moving");
  glassPanel.classList.add("on-case","correct-flash");
  setTimeout(() => glassPanel.classList.remove("correct-flash"), 450);
  refreshPartLocks();
  if(window.refreshM2SlotOverlay) window.refreshM2SlotOverlay();
}

function leavePanelWhereDropped(clientX, clientY){
  movePanel(clientX, clientY);
  glassPanel.classList.remove("on-case","correct-flash","is-moving");
  glassPanel.classList.add("free-placed","removed");
  refreshPartLocks();
  if(window.refreshM2SlotOverlay) window.refreshM2SlotOverlay();
}

glassPanel.addEventListener("pointerdown", panelPointerDown);

const motherboardIcon = document.getElementById("motherboard");
const motherboardTarget = document.getElementById("motherboardTarget");
let motherboardElement = null;
let activeMotherboard = null;
let mbOffsetX = 0;
let mbOffsetY = 0;

function lockNonMotherboardParts(){
  refreshPartLocks();
  if(window.refreshM2SlotOverlay) window.refreshM2SlotOverlay();
}

function createMotherboard(clientX, clientY){
  if(!isGlassRemoved()) return;
  if(motherboardElement){
    beginMotherboardDrag(motherboardElement, clientX, clientY, true);
    return;
  }

  const workspaceRect = workspace.getBoundingClientRect();
  const board = document.createElement("div");
  board.className = "workspace-motherboard";
  board.innerHTML = motherboardSVG;
  board.style.left = (clientX - workspaceRect.left - 114) + "px";
  board.style.top = (clientY - workspaceRect.top - 136) + "px";

  workspace.appendChild(board);
  motherboardElement = board;
  motherboardIcon.classList.add("source-used");

  board.addEventListener("pointerdown", event => {
    beginMotherboardDrag(board, event.clientX, event.clientY, false);
    event.preventDefault();
  });

  beginMotherboardDrag(board, clientX, clientY, true);
}

function beginMotherboardDrag(board, clientX, clientY, fromShelf){
  const rect = board.getBoundingClientRect();
  activeMotherboard = board;
  board.classList.remove("placed");
  board.classList.add("dragging-live");

  mbOffsetX = fromShelf ? rect.width / 2 : clientX - rect.left;
  mbOffsetY = fromShelf ? rect.height / 2 : clientY - rect.top;

  moveMotherboard(clientX, clientY);
  window.addEventListener("pointermove", moveMotherboardLive);
  window.addEventListener("pointerup", releaseMotherboard, {once:true});
}

function moveMotherboard(clientX, clientY){
  const workspaceRect = workspace.getBoundingClientRect();
  activeMotherboard.style.left = (clientX - workspaceRect.left - mbOffsetX) + "px";
  activeMotherboard.style.top = (clientY - workspaceRect.top - mbOffsetY) + "px";
}

function moveMotherboardLive(event){
  if(!activeMotherboard) return;
  moveMotherboard(event.clientX, event.clientY);
  activeMotherboard.classList.toggle("near-target", pointerInside(event.clientX, event.clientY, motherboardTarget));
}

function releaseMotherboard(event){
  if(!activeMotherboard) return;

  const workspaceRect = workspace.getBoundingClientRect();
  const targetRect = motherboardTarget.getBoundingClientRect();
  const overTarget = pointerInside(event.clientX, event.clientY, motherboardTarget);
  const overShelf = event.clientY >= workspaceRect.bottom;

  activeMotherboard.classList.remove("dragging-live","near-target");

  if(overShelf){
    activeMotherboard.remove();
    motherboardElement = null;
    motherboardIcon.classList.remove("source-used");
    refreshPartLocks();
  if(window.refreshM2SlotOverlay) window.refreshM2SlotOverlay();
  }else if(overTarget){
    activeMotherboard.style.left = (targetRect.left - workspaceRect.left) + "px";
    activeMotherboard.style.top = (targetRect.top - workspaceRect.top) + "px";
    activeMotherboard.classList.add("placed");
    refreshPartLocks();
  if(window.refreshM2SlotOverlay) window.refreshM2SlotOverlay();
  }

  window.removeEventListener("pointermove", moveMotherboardLive);
  activeMotherboard = null;
}

motherboardIcon.addEventListener("pointerdown", event => {
  createMotherboard(event.clientX, event.clientY);
  event.preventDefault();
});

lockNonMotherboardParts();

/* Placement rules:

   2. Motherboard must be installed first.
   3. CPU fan requires CPU first.
   4. Other internal components may be placed after motherboard is installed.
*/
function isGlassRemoved(){
  return !glassPanel.classList.contains("on-case");
}

function isMotherboardInstalled(){
  return motherboardElement && motherboardElement.classList.contains("placed");
}

function isCpuInstalled(){
  return cpuElement && cpuElement.classList.contains("placed");
}

function refreshPartLocks(){
  document.querySelectorAll(".part").forEach(part => {
    part.classList.add("locked-for-step");
    part.classList.remove("unlocked-part");
  });

  if(isGlassRemoved()){
    motherboardIcon.classList.remove("locked-for-step");
    motherboardIcon.classList.add("unlocked-part");
  }

  if(isGlassRemoved() && isMotherboardInstalled()){
    ["cpu","ram","nvme","gpu","psu","caseFan"].forEach(id => {
      const part = document.getElementById(id);
      if(part){
        part.classList.remove("locked-for-step");
        part.classList.add("unlocked-part");
      }
    });
  }

  if(isGlassRemoved() && isMotherboardInstalled() && isCpuInstalled()){
    cpuFanIcon.classList.remove("locked-for-step");
    cpuFanIcon.classList.add("unlocked-part");
  }
}

});

const psuIcon = document.getElementById("psu");
const psuTarget = document.getElementById("psuTarget");
let psuElement = null;
let activePsu = null;
let psuOffsetX = 0;
let psuOffsetY = 0;

function createPsu(clientX, clientY){
  if(!isGlassRemoved() || !isMotherboardInstalled()) return;
  if(psuElement){
    beginPsuDrag(psuElement, clientX, clientY, true);
    return;
  }

  const workspaceRect = workspace.getBoundingClientRect();
  const psu = document.createElement("div");
  psu.className = "workspace-psu";
  psu.id = "workspacePsu";
  psu.innerHTML = psuSVG;
  psu.style.left = (clientX - workspaceRect.left - 125) + "px";
  psu.style.top = (clientY - workspaceRect.top - 86) + "px";

  workspace.appendChild(psu);
  psuElement = psu;
  psuIcon.classList.add("source-used");

  psu.addEventListener("pointerdown", event => {
    beginPsuDrag(psu, event.clientX, event.clientY, false);
    event.preventDefault();
  });

  beginPsuDrag(psu, clientX, clientY, true);
}

function beginPsuDrag(psu, clientX, clientY, fromShelf){
  const rect = psu.getBoundingClientRect();
  activePsu = psu;
  psu.classList.remove("placed");
  if(psu.innerHTML !== psuSVG) psu.innerHTML = psuSVG;
  psu.style.width = "250px";
  psu.style.height = "172px";
  psu.classList.add("dragging-live");

  psuOffsetX = fromShelf ? rect.width / 2 : clientX - rect.left;
  psuOffsetY = fromShelf ? rect.height / 2 : clientY - rect.top;

  movePsu(clientX, clientY);
  window.addEventListener("pointermove", movePsuLive);
  window.addEventListener("pointerup", releasePsu, {once:true});
}

function movePsu(clientX, clientY){
  const workspaceRect = workspace.getBoundingClientRect();
  activePsu.style.left = (clientX - workspaceRect.left - psuOffsetX) + "px";
  activePsu.style.top = (clientY - workspaceRect.top - psuOffsetY) + "px";
}

function movePsuLive(event){
  if(!activePsu) return;
  movePsu(event.clientX, event.clientY);
  activePsu.classList.toggle("near-target", pointerInside(event.clientX, event.clientY, psuTarget));
}

function releasePsu(event){
  if(!activePsu) return;

  const workspaceRect = workspace.getBoundingClientRect();
  const targetRect = psuTarget.getBoundingClientRect();
  const overTarget = pointerInside(event.clientX, event.clientY, psuTarget);
  const overShelf = event.clientY >= workspaceRect.bottom;

  activePsu.classList.remove("dragging-live","near-target");

  if(overShelf){
    activePsu.remove();
    psuElement = null;
    psuIcon.classList.remove("source-used");
    refreshPartLocks();
  }else if(overTarget){
    activePsu.innerHTML = psuInstalledSVG;
    activePsu.style.width = "245px";
    activePsu.style.height = "136px";
    activePsu.style.left = "430px";
    activePsu.style.top = "430px";
    activePsu.classList.add("placed");
    refreshPartLocks();
  }

  window.removeEventListener("pointermove", movePsuLive);
  activePsu = null;
}

psuIcon.addEventListener("pointerdown", event => {
  createPsu(event.clientX, event.clientY);
  event.preventDefault();
});

refreshPartLocks();
  if(window.refreshM2SlotOverlay) window.refreshM2SlotOverlay();

</script>

  if(z){
    z.style.background='transparent';
    z.style.border='none';
    z.style.outline='none';
    z.style.boxShadow='none';
  }
},true);

document.addEventListener('dragover',e=>{
  const z=e.target.closest?.('.drop-zone,.dropzone,.drop-target,.drop-area');
  if(z){
    z.style.background='transparent';
    z.style.boxShadow='none';
  }
},true);
</script>

<script id="m2-slot-visibility-script-v42">
(function(){
  function getM2Overlay(){
    return document.getElementById("m2SlotOverlay");
  }
  function boardInstalled(){
    const board = document.querySelector(".workspace-motherboard.placed");
    return !!board;
  }
  function nvmeInstalled(){
    const drive = document.querySelector(".workspace-nvme.placed");
    return !!drive;
  }
  window.refreshM2SlotOverlay = function(){
    const overlay = getM2Overlay();
    if(!overlay) return;
    overlay.classList.toggle("show", boardInstalled() && !nvmeInstalled());
  };
  document.addEventListener("pointerup", function(){
    setTimeout(window.refreshM2SlotOverlay, 0);
  });
  document.addEventListener("DOMContentLoaded", window.refreshM2SlotOverlay);
  setTimeout(window.refreshM2SlotOverlay, 0);
})();
</script>
